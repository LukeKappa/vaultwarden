name: Build Vaultwarden for Termux

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Ensure target is installed
        run: rustup target add aarch64-linux-android

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Build Binary
        run: cargo ndk -t aarch64-linux-android build --release --features sqlite,vendored_openssl

      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vaultwarden-aarch64-bionic
          path: target/aarch64-linux-android/release/vaultwarden
          retention-days: 7